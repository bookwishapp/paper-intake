[build]
builder = "nixpacks"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "paper-intake"
port = 3000

[services.paper-intake]
environmentVariables = [
  "ISBNDB_API_KEY",
  "SQUARE_ACCESS_TOKEN",
  "SQUARE_LOCATION_ID",
  "UPCITEMDB_API_KEY"
]